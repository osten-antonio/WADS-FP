version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN="${FRONTEND_ORIGIN:-http://localhost:3000}"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  db-schema-sync:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env
    command: ["npx", "prisma", "migrate", "deploy", "--schema=./prisma/schema.prisma"]
    restart: "no"

volumes:
  redis-data: