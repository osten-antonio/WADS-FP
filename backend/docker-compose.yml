version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME:-localhost}
      - FRONTEND_PROTOCOL=${FRONTEND_PROTOCOL:-http}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - BACKEND_HOSTNAME=${BACKEND_HOSTNAME:-localhost}
      - BACKEND_PROTOCOL=${BACKEND_PROTOCOL:-http}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-llama3.1:8b}
    depends_on:
      - redis
    networks:
      - WADS-FP-shared-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - WADS-FP-shared-network

  db-schema-sync:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env
    command: ["npx", "prisma", "migrate", "deploy", "--schema=./prisma/schema.prisma"]
    restart: "no"

volumes:
  redis-data:
  
networks:
  WADS-FP-shared-network:
    external: true