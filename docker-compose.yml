version: '3.8'
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME:-localhost}
      - ALLOW_DEV_USER_ID_HEADER=true
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      secrets:
        - frontend_env
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
      - BACKEND_PROTOCOL=${BACKEND_PROTOCOL:-http}
      - BACKEND_HOSTNAME=${BACKEND_HOSTNAME:-backend}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - FRONTEND_PORT=${FRONTEND_PORT:-3000}
    depends_on:
      - backend

volumes:
  redis-data:

secrets:
  frontend_env:
    file: ./frontend/.env
