name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint_typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint (if configured)
        shell: bash
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured in backend/package.json; skipping lint."
          fi

      - name: Type Check
        run: npx tsc --noEmit

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint_typecheck
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests
        shell: bash
        run: |
          UNIT_TEST_FILES=$(find src -type f -name "*.test.ts" ! -name "*.integration.test.ts")
          if [ -z "$UNIT_TEST_FILES" ]; then
            echo "No backend unit tests found; skipping."
            exit 0
          fi
          echo "Running unit tests:"
          echo "$UNIT_TEST_FILES"
          node --import tsx --test $UNIT_TEST_FILES

  migration_check:
    name: Migration Check
    runs-on: ubuntu-latest
    needs: lint_typecheck
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Verify migration status
        run: npx prisma migrate status

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: migration_check
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run integration tests when present
        shell: bash
        run: |
          INTEGRATION_TEST_FILES=$(find src -type f -name "*.integration.test.ts")
          if [ -z "$INTEGRATION_TEST_FILES" ]; then
            echo "No backend integration tests found; skipping."
            exit 0
          fi
          echo "Running integration tests:"
          echo "$INTEGRATION_TEST_FILES"
          node --import tsx --test $INTEGRATION_TEST_FILES

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit_tests, migration_check, integration_tests]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build